spring.application.name=search-typeahead

spring.datasource.url=jdbc:postgresql://localhost:5433/search_typeahead?options=-c%20TimeZone%3DUTC
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.data.redis.repositories.enabled=false
spring.web.resources.static-locations=classpath:/static/,file:../frontend/

app.redis.virtual-nodes=128
app.redis.suggestion-ttl=10m
app.redis.nodes[0].id=redis-1
app.redis.nodes[0].host=localhost
app.redis.nodes[0].port=6379
app.redis.nodes[1].id=redis-2
app.redis.nodes[1].host=localhost
app.redis.nodes[1].port=6380
app.redis.nodes[2].id=redis-3
app.redis.nodes[2].host=localhost
app.redis.nodes[2].port=6381

app.search.batch.flush-interval-ms=5000
app.search.batch.flush-size=500
app.search.recent-window-minutes=15
app.dataset.load-on-startup=true
